<!DOCTYPE html>
<html>
<body>
<h2>Radio buttons</h2>
<p>Pick a meal to order</p>
<form>
    <input type="radio" id="burger" name="food" value="burger">
    <label for="burger">Burger</label><br>
    <input type="radio" id="pasta" name="food" value="pasta">
    <label for="pasta">Fettacine</label><br>
    <input type="radio" id="salad" name="food" value="salad">
    <label for="salad">Salad</label>
</form>
<h2>Checkboxes</h2>
<p>The <strong>input type=checkbox</strong> defines a checkbox: </p>

<form action="">
    <input type="checkbox" id="option1" name="option1" value="rock">
    <label for="option1">I got rocks</label><br>
    <input type="checkbox" id="option2" name="option2" value="pill">
    <label for="option2">I got pills</label><br>
    <input type="checkbox" id="option3" name="option3" value="spud">
    <label for="option3">I got spuds</label><br><br>
    <input type="submit" value="Save">
</form>

</body>    
</html>
